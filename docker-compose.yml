# ============================================================
# 赛博AI平台 - Docker Compose 生产级配置
# 服务组成：
#   1. postgres-pgvector - PostgreSQL + PgVector向量数据库
#   2. elasticsearch - Elasticsearch搜索引擎
#   3. logstash - Logstash日志收集管道
#   4. kibana - Kibana日志可视化面板
#   5. ollama - 本地大模型服务
#   6. app - Spring Boot应用服务
# 使用说明：
#   - 全栈启动：docker-compose up -d
#   - 查看应用日志：docker-compose logs -f app
#   - 停止所有服务：docker-compose down
# ============================================================

version: '3.8'

services:
  # ==================== PostgreSQL + PgVector 向量数据库服务 ====================
  postgres-pgvector:
    image: pgvector/pgvector:pg16
    container_name: cyber-postgres
    environment:
      POSTGRES_DB: ai_learn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      # 数据持久化卷
      - postgres_data:/var/lib/postgresql/data
    # 健康检查：使用pg_isready命令检查数据库是否就绪
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyber-network

  # ==================== Elasticsearch 搜索引擎服务 ====================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: cyber-elasticsearch
    environment:
      - discovery.type=single-node
      # 禁用安全认证（生产环境建议启用）
      - xpack.security.enabled=false
      # JVM堆内存配置
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      # Elasticsearch数据持久化卷
      - es_data:/usr/share/elasticsearch/data
    networks:
      - cyber-network

  # ==================== Logstash 日志收集服务 ====================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: cyber-logstash
    volumes:
      # Logstash管道配置文件
      - ./docker/logstash/pipeline:/usr/share/logstash/pipeline
      # Logstash全局配置文件
      - ./docker/logstash/config:/usr/share/logstash/config
      # 挂载应用日志目录，只读模式供Logstash读取
      - ./logs:/app/logs:ro
    depends_on:
      - elasticsearch
    networks:
      - cyber-network

  # ==================== Kibana 日志可视化服务 ====================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: cyber-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - cyber-network

  # ==================== Ollama 本地大模型服务 ====================
  ollama:
    image: ollama/ollama:latest
    container_name: cyber-ollama
    ports:
      - "11434:11434"
    volumes:
      # 模型数据持久化卷
      - ollama_data:/root/.ollama
    networks:
      - cyber-network

  # ==================== Spring Boot 应用服务 ====================
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: cyber-app
    ports:
      - "8080:8080"
    environment:
      # ==================== Spring Profile配置 ====================
      - SPRING_PROFILES_ACTIVE=docker
      # ==================== 数据源配置（PostgreSQL + PgVector） ====================
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-pgvector:5432/ai_learn
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      # ==================== Ollama AI配置 ====================
      - SPRING_AI_OLLAMA_BASE_URL=http://ollama:11434
      - SPRING_AI_OLLAMA_CHAT_OPTIONS_MODEL=qwen2.5:7b
      - SPRING_AI_OLLAMA_EMBEDDING_OPTIONS_MODEL=nomic-embed-text
      # ==================== PgVector向量存储配置 ====================
      - SPRING_AI_VECTORSTORE_PGVECTOR_ENABLED=true
      # ==================== JWT配置（生产环境务必修改为强密钥） ====================
      - JWT_SECRET=your-production-jwt-secret-key-must-be-at-least-256-bits-long-for-production-security
      # ==================== Tavily联网搜索API Key ====================
      - TAVILY_API_KEY=${TAVILY_API_KEY:-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}
      # ==================== Swagger/API文档开关（生产环境关闭） ====================
      - SWAGGER_ENABLED=false
    volumes:
      # 应用日志持久化（供Logstash采集）
      - ./logs:/app/logs
      # 文件上传目录持久化
      - ./uploads:/app/uploads
    depends_on:
      postgres-pgvector:
        condition: service_healthy
      elasticsearch:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      - cyber-network

# ==================== 数据卷定义（持久化存储） ====================
volumes:
  postgres_data:
  es_data:
  ollama_data:

# ==================== 网络定义 ====================
networks:
  cyber-network:
    driver: bridge
