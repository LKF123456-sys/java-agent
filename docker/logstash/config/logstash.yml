# ============================================================
# Logstash 全局配置文件
# ============================================================

# HTTP API监听地址（用于健康检查和监控）
http.host: "0.0.0.0"
# 管道配置文件路径
path.config: /usr/share/logstash/pipeline
# 管道工作线程数
pipeline.workers: 2
# 管道批量处理大小
pipeline.batch.size: 125
# 管道批量处理延迟（毫秒）
pipeline.batch.delay: 50
