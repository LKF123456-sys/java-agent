# ============================================================
# Logstash 管道配置文件
# 功能：收集Spring Boot应用JSON格式日志，解析后输出到Elasticsearch
# ============================================================

# ==================== Input 输入配置 ====================
input {
  # 文件输入：监听应用JSON日志文件
  file {
    # 日志文件路径模式：匹配滚动生成的JSON日志文件
    path => "/app/logs/app-json-*.log"
    # 使用JSON codec直接解析输入
    codec => "json"
    # 从文件开头开始读取（首次启动时）
    start_position => "beginning"
    # 不记录sincedb位置，每次重启从头读取（适合容器环境）
    sincedb_path => "/dev/null"
  }
}

# ==================== Filter 过滤器配置 ====================
filter {
  # 时间戳处理：使用日志中的时间戳作为@timestamp
  date {
    match => [ "timestamp", "yyyy-MM-dd'T'HH:mm:ss.SSS'Z'", "yyyy-MM-dd HH:mm:ss.SSS" ]
    target => "@timestamp"
  }
  # 字段重命名：避免与Logstash内置message字段冲突
  mutate {
    rename => { "message" => "log_message" }
  }
}

# ==================== Output 输出配置 ====================
output {
  # 输出到Elasticsearch
  elasticsearch {
    # Elasticsearch集群地址
    hosts => ["http://elasticsearch:9200"]
    # 索引名称：按日期自动分割，cyber-ai-logs-YYYY.MM.dd
    index => "cyber-ai-logs-%{+YYYY.MM.dd}"
  }
  # 调试输出：标准输出打印日志（开发调试用）
  stdout { codec => rubydebug }
}
