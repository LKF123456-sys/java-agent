server:
  port: 8080

spring:
  application:
    name: java-ai-learn
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.transformers.TransformersEmbeddingModelAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

  ai:
    # ====================================================
    # Ollama 配置（本地模型，无需 API key）
    # 需先安装 Ollama: https://ollama.ai
    # ====================================================
    ollama:
      chat:
        enabled: true
        options:
          model: qwen2.5:7b      # 推荐中文模型
          temperature: 0.7
      embedding:
        enabled: true
        options:
          model: nomic-embed-text  # Ollama Embedding 模型
      base-url: http://localhost:11434

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.ai: DEBUG   # 开启 Spring AI 日志，方便学习调试
    com.ailearn: DEBUG